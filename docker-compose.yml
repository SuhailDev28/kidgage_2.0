version: '3.9'
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports: ["27017:27017"]
    volumes: [mongo_data:/data/db]

  server:
    build: ./server
    restart: unless-stopped
    ports: ["5000:5000"]
    env_file: [./server/.env]
    depends_on: [mongo]

  client:
    build: ./client
    restart: unless-stopped
    ports: ["4173:4173"]
    env_file: [./client/.env]
    depends_on: [server]

volumes:
  mongo_data:
