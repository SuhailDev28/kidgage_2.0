<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>KidGage</title>

    <meta
      name="description"
      content="KidGage is a kids activity booking platform for parents to find academies, select activities, and book available slots."
    />

    <meta name="theme-color" content="#AEC4A0" />

    <!-- Android / Chrome PWA -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="KidGage" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Icons -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="KidGage" />
    <meta
      property="og:description"
      content="Book kids activities, academies, classes, and activity slots with KidGage."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/pwa-512x512.png" />

    <!-- Twitter / X Preview -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="KidGage" />
    <meta
      name="twitter:description"
      content="Book kids activities, academies, classes, and activity slots with KidGage."
    />
    <meta name="twitter:image" content="/pwa-512x512.png" />
  </head>

  <body class="bg-surface">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
